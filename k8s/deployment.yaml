apiVersion: apps/v1
kind: Deployment
metadata:
  name: omniff
  labels:
    app: omniff
spec:
  replicas: 1
  selector:
    matchLabels:
      app: omniff
  template:
    metadata:
      labels:
        app: omniff
    spec:
      containers:
        - name: omniff
          image: ghcr.io/stukenov/omniff:latest
          ports:
            - containerPort: 8000
          resources:
            limits:
              nvidia.com/gpu: "1"
              memory: "16Gi"
            requests:
              memory: "8Gi"
          env:
            - name: OMNIFF_HOST
              value: "0.0.0.0"
            - name: OMNIFF_PORT
              value: "8000"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
          startupProbe:
            httpGet:
              path: /health
              port: 8000
            failureThreshold: 30
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: omniff
spec:
  selector:
    app: omniff
  ports:
    - port: 80
      targetPort: 8000
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: omniff
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: omniff
  minReplicas: 1
  maxReplicas: 4
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 80
